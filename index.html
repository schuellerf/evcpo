<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EV Charge Price Optimizer</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>EV Charge Price Optimizer</h1>
        <p class="subtitle">Optimize charging based on awattar.at electricity prices</p>
      </header>

      <section class="controls">
        <div class="form-row">
          <label for="current-soc">Current SOC (%)</label>
          <input type="number" id="current-soc" min="0" max="100" value="20" />
        </div>
        <div class="form-row">
          <label for="target-soc">Target SOC (%)</label>
          <input type="number" id="target-soc" min="0" max="100" value="80" />
        </div>
        <div class="form-row">
          <label for="target-time">Target time</label>
          <input type="datetime-local" id="target-time" />
        </div>
        <div class="form-row">
          <label for="charge-speed">Charge speed (%/hour)</label>
          <input type="number" id="charge-speed" min="0.1" max="100" step="0.1" value="10" />
        </div>
        <div class="form-row">
          <button type="button" id="calculate">Calculate</button>
          <button type="button" id="update-chart">Update chart</button>
        </div>
      </section>

      <section class="result" id="result-section">
        <h2>Result</h2>
        <p id="result-text">—</p>
      </section>

      <section class="chart-section">
        <h2>Price by Target Hour & SOC</h2>
        <div id="chart" class="chart"></div>
      </section>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
