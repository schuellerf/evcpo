<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EV Charge Price Optimizer</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>EV Charge Price Optimizer</h1>
        <p class="subtitle">Optimize charging based on awattar.at electricity prices</p>
      </header>

      <section class="controls">
        <div class="controls-column controls-left">
          <div class="form-row">
            <label for="target-soc">Target SOC (%)</label>
            <div class="form-row-inputs">
              <input type="number" id="target-soc" min="0" max="100" value="80" />
              <input type="range" id="target-soc-slider" min="0" max="100" value="80" />
            </div>
          </div>
        </div>
        <div class="controls-column controls-right">
          <div class="form-row form-row-split">
            <div>
              <label for="target-date">Target date</label>
              <input type="date" id="target-date" />
            </div>
            <div>
              <label for="target-time">Target time</label>
              <input type="time" id="target-time" value="10:00" />
            </div>
          </div>
          <div class="form-row">
            <label for="result-text">Result</label>
            <p id="result-text" class="result-inline">—</p>
          </div>
        </div>
      </section>

      <section class="chart-section">
        <div class="chart-tabs">
          <button type="button" class="tab-button active" data-tab="max">Max Price</button>
          <button type="button" class="tab-button" data-tab="avg">Average price</button>
        </div>
        <div id="tab-panel-max" class="tab-panel active">
          <div class="charts-secondary">
            <div id="chart-2d-fixed-time-max" class="chart chart-2d"></div>
            <div id="chart-2d-fixed-soc-max" class="chart chart-2d"></div>
          </div>
          <div id="chart-3d-max" class="chart chart-3d"></div>
        </div>
        <div id="tab-panel-avg" class="tab-panel">
          <div class="chart-toolbar-avg">
            <label class="toggle-label">
              <input type="checkbox" id="z-mode-price" />
              <span>Price (€)</span>
            </label>
          </div>
          <div class="charts-secondary">
            <div id="chart-2d-fixed-time" class="chart chart-2d"></div>
            <div id="chart-2d-fixed-soc" class="chart chart-2d"></div>
          </div>
          <div id="chart" class="chart chart-3d"></div>
        </div>
        <section class="settings-below-chart">
          <h3>Settings</h3>
          <div class="settings-row">
            <div class="form-row">
              <label>Power</label>
              <span id="power-multiplier-wrap" class="power-multiplier-wrap">
                <span id="power-kw">11.04</span> kW
              </span>
            </div>
            <div class="form-row">
              <label for="current-soc">Current SOC (%)</label>
              <div class="form-row-inputs">
                <input type="number" id="current-soc" min="0" max="100" value="20" />
                <input type="range" id="current-soc-slider" min="0" max="100" value="20" />
              </div>
            </div>
            <div class="form-row">
              <label for="ev-capacity">EV Capacity (kWh)</label>
              <div class="form-row-inputs">
                <input type="number" id="ev-capacity" min="40" max="100" value="60" />
                <input type="range" id="ev-capacity-slider" min="40" max="100" value="60" />
              </div>
            </div>
            <div class="chart-toolbar-power">
              <label>Amps</label>
              <input type="range" id="charge-amps" min="6" max="16" value="16" />
              <span id="charge-amps-value">16</span> A
              <label class="toggle-label">
                <input type="checkbox" id="charge-3phase" checked />
                <span>3 phase</span>
              </label>
            </div>
            <div class="voltage-selector">
              <label>Voltage</label>
              <label><input type="radio" name="voltage" value="230" checked /> 230V</label>
              <label><input type="radio" name="voltage" value="110" /> 110V</label>
            </div>
          </div>
        </section>
      </section>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
